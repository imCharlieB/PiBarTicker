<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="preload" href="/pibarticker-logo.svg" as="image" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PiBarTicker</title>
    <!-- Hide cursor immediately in kiosk mode before React loads -->
    <style id="kiosk-pre-style"></style>
    <script>
      if (new URLSearchParams(location.search).get('kiosk') === '1') {
        document.documentElement.classList.add('kiosk-mode');
        document.getElementById('kiosk-pre-style').textContent =
          'html.kiosk-mode,html.kiosk-mode *{cursor:none!important}';
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,500;0,700;0,800;0,900;1,800;1,900&family=Spline+Sans+Mono:wght@500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
